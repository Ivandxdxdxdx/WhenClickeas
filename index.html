<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clicker Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: #1e1e1e;
      padding: 40px;
      border-radius: 20px;
      width: 340px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .score {
      font-size: 40px;
      margin: 20px 0;
    }

    .best {
      color: gold;
      margin-bottom: 10px;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
      background: #00c853;
      color: white;
    }

    .shop button {
      background: #333;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>🎮 Clicker Shop</h1>

    <div class="best">
      🏆 Best: <span id="best">0</span>
    </div>

    <div class="score">
      <span id="score">0</span>
    </div>

    <button onclick="clickBtn()">CLICK</button>

    <div class="shop">
      <button onclick="buyPower()">💰 +1 por click (coste: 50)</button>
      <button onclick="buyAuto()">🤖 AutoClick (coste: 100)</button>
    </div>

  </div>

  <script>
    let score = 0;
    let perClick = 1;
    let auto = false;

    let best = localStorage.getItem("best") || 0;
    document.getElementById("best").innerText = best;

    function update() {
      document.getElementById("score").innerText = score;

      if (score > best) {
        best = score;
        localStorage.setItem("best", best);
        document.getElementById("best").innerText = best;
      }
    }

    function clickBtn() {
      score += perClick;
      update();
    }

    // 💰 mejora click
    function buyPower() {
      if (score >= 50) {
        score -= 50;
        perClick += 1;
        update();
      }
    }

    // 🤖 autoclick
    function buyAuto() {
      if (score >= 100 && !auto) {
        score -= 100;
        auto = true;
        update();

        setInterval(() => {
          score += perClick;
          update();
        }, 500);
      }
    }
  </script>

</body>
</html>
