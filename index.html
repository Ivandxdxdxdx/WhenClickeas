<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clicker Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* 🔵 LOADING SCREEN */
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      z-index: 999;
    }

    .card {
      text-align: center;
      background: #1e1e1e;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .score {
      font-size: 40px;
      margin: 20px 0;
    }

    .best {
      color: gold;
      margin-bottom: 10px;
    }

    button {
      padding: 20px 40px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: #00c853;
      color: white;
    }
  </style>
</head>

<body>

  <!-- 🔵 LOADING -->
  <div id="loading">Cargando juego...</div>

  <!-- 🎮 GAME -->
  <div class="card">
    <h1>🎮 Clicker</h1>

    <div class="best">
      🏆 Best: <span id="best">0</span>
    </div>

    <div class="score">
      <span id="score">0</span>
    </div>

    <button onclick="clickBtn()">CLICK</button>
    <br><br>

    <button onclick="buyAuto()">🤖 AutoClick (50)</button>

  </div>

  <script>
    let score = 0;
    let perClick = 1;
    let auto = false;

    // 🏆 best score
    let best = localStorage.getItem("best") || 0;
    document.getElementById("best").innerText = best;

    function update() {
      document.getElementById("score").innerText = score;

      if (score > best) {
        best = score;
        localStorage.setItem("best", best);
        document.getElementById("best").innerText = best;
      }
    }

    function clickBtn() {
      score += perClick;
      update();
    }

    function buyAuto() {
      if (score >= 50 && !auto) {
        score -= 50;
        auto = true;
        update();

        // 🤖 auto click cada 500ms
        setInterval(() => {
          score += perClick;
          update();
        }, 500);
      }
    }

    // ⏳ loading fake
    setTimeout(() => {
      document.getElementById("loading").style.display = "none";
    }, 1500);

  </script>

</body>
</html>
