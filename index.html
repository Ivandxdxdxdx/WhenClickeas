<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clicker Best Score</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .score {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 24px;
      z-index: 1000;
    }

    .best {
      position: fixed;
      top: 40px;
      left: 10px;
      font-size: 18px;
      color: #ffd700;
      z-index: 1000;
    }

    .circle {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #00c853;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      user-select: none;
    }
  </style>
</head>

<body>

  <div class="score">
    Score: <span id="score">0</span>
  </div>

  <div class="best">
    🏆 Your best: <span id="best">0</span>
  </div>

  <script>
    let score = 0;

    // 📦 cargar best score guardado
    let bestScore = localStorage.getItem("bestScore") || 0;
    document.getElementById("best").innerText = bestScore;

    function updateScore() {
      document.getElementById("score").innerText = score;

      // 🧠 actualizar best score
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScore", bestScore);
        document.getElementById("best").innerText = bestScore;
      }
    }

    function createCircle() {
      const circle = document.createElement("div");
      circle.className = "circle";
      circle.innerText = "+10";

      const x = Math.random() * (window.innerWidth - 60);
      const y = Math.random() * (window.innerHeight - 60);

      circle.style.left = x + "px";
      circle.style.top = y + "px";

      circle.onclick = () => {
        score += 10;
        updateScore();
        circle.remove();
      };

      document.body.appendChild(circle);

      setTimeout(() => {
        circle.remove();
      }, 1500);
    }

    setInterval(createCircle, 700);
  </script>

</body>
</html>
