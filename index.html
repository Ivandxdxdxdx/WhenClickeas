<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clicker Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: #1e1e1e;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .score {
      font-size: 40px;
      margin: 20px 0;
    }

    .best {
      color: gold;
      margin-bottom: 10px;
    }

    button {
      padding: 20px 40px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: #00c853;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .shop button {
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
      background: #333;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>🎮 Clicker</h1>

    <div class="best">
      🏆 Best: <span id="best">0</span>
    </div>

    <div class="score">
      <span id="score">0</span>
    </div>

    <button onclick="clickBtn()">CLICK</button>

    <div class="shop">
      <button onclick="upgrade()">💰 +1 por click (coste: 50)</button>
    </div>

  </div>

  <script>
    let score = 0;
    let perClick = 1;

    let best = localStorage.getItem("best") || 0;
    document.getElementById("best").innerText = best;

    function clickBtn() {
      score += perClick;
      document.getElementById("score").innerText = score;

      if (score > best) {
        best = score;
        localStorage.setItem("best", best);
        document.getElementById("best").innerText = best;
      }
    }

    function upgrade() {
      if (score >= 50) {
        score -= 50;
        perClick += 1;
        document.getElementById("score").innerText = score;
      }
    }
  </script>

</body>
</html>
